name: Build binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt

      - name: Build binary
        run: pyinstaller convert_to_jpg.spec

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\convert-to-jpg.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  convert-to-jpg.exe" | Out-File -Encoding utf8NoBOM dist\SHA256SUMS

      - name: Zip executable
        shell: pwsh
        run: |
          Compress-Archive -Path dist\convert_to_jpg.exe, dist\SHA256SUMS -DestinationPath dist\convert-to-jpg.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: convert-to-jpg-windows
          path: |
            dist/convert-to-jpg.exe
            dist/SHA256SUMS

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/convert-to-jpg-windows/convert-to-jpg.exe
            artifacts/convert-to-jpg-windows/SHA256SUMS
          generate_release_notes: true
